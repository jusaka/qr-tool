<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QR Tool</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <h1>📷 QR Tool</h1>
  <div class="tabs">
    <div class="tab active" data-tab="qr">QR码</div>
    <div class="tab" data-tab="scan">扫码</div>
    <div class="tab" data-tab="transfer">传输</div>
  </div>

  <!-- QR Generator -->
  <div id="p-qr" class="panel active">
    <div class="qr-box">
      <textarea id="qrInput" placeholder="输入文本生成QR码..."></textarea>
      <div class="qr-preview" id="qrPreview"><div class="empty">⬜</div></div>
    </div>
    <div class="btn-row">
      <div class="btn" id="btnPaste">📋 粘贴</div>
      <div class="btn" id="btnCopy">📄 复制</div>
    </div>
  </div>

  <!-- Scanner -->
  <div id="p-scan" class="panel">
    <div class="scan-wrap">
      <video id="scanVideo" autoplay playsinline muted></video>
      <div class="scan-line"></div>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <div class="btn" id="btnFlip">🔄 切换摄像头</div>
      <div class="btn" id="btnUpload">🖼️ 从图片识别</div>
    </div>
    <input type="file" id="imgInput" accept="image/*" style="display:none">
  </div>

  <!-- Encrypted Transfer -->
  <div id="p-transfer" class="panel">
    <div class="transfer-box">
      <label>🔑 传输密钥（双方需一致）</label>
      <input id="tfKey" placeholder="输入一个共享密钥...">
    </div>
    <div class="transfer-box">
      <label>📝 要发送的文本</label>
      <textarea id="tfText" placeholder="输入要加密发送的内容..." style="min-height:60px"></textarea>
    </div>
    <div class="btn-row">
      <div class="btn primary" id="btnSend">🔒 加密发送</div>
      <div class="btn primary" id="btnRecv">🔓 解密接收</div>
    </div>
    <div class="status" id="tfStatus"></div>
    <div class="key-display" id="tfKeyHash"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="lib/qrcode.min.js"></script>
<script src="lib/jsqr.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/qr.js"></script>
<script src="js/scan.js"></script>
<script src="js/transfer.js"></script>
<script src="js/app.js"></script>
</body>
</html>
